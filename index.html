    <!-- 宠物模块脚本 -->
    <script>
        /**
         * 状态机类 - 管理动画状态转换
         */
        class StateMachine {
            constructor(context, states, initialState) {
                this.context = context;
                this.states = states;
                this.currentState = null;
                this.previousState = null;
                this.transitionDuration = 200;
                if (initialState && states[initialState]) {
                    this.setState(initialState, true);
                }
            }

            setState(newState, immediate = false) {
                if (!this.states[newState] || this.currentState === newState) return;
                if (this.currentState && this.states[this.currentState].exit) {
                    this.states[this.currentState].exit();
                }
                this.previousState = this.currentState;
                this.currentState = newState;
                if (this.states[newState].enter) {
                    if (immediate) {
                        this.states[newState].enter();
                    } else {
                        this.context.skeleton.blendTo(newState, this.transitionDuration);
                    }
                }
            }

            getState() {
                return this.currentState;
            }

            getPreviousState() {
                return this.previousState;
            }
        }

        /**
         * 骨骼动画类 - 独立控制各身体部位
         */
        class SkeletonAnimation {
            constructor(elements) {
                this.elements = elements;
                this.isRunning = false;
                this.currentAnimation = null;
                this.animationFrame = null;
                this.lastTime = 0;
                this.animationProgress = 0;
                this.blendProgress = 1;
                this.blendFrom = null;
                this.blendDuration = 200;
                this.animationSpeed = 1.0;
                this.animationAmplitude = {
                    head: 15,
                    arm: 25,
                    leg: 25,
                    tail: 20
                };

                this.animations = {
                    idle: this.createIdleAnimation(),
                    walk: this.createWalkAnimation(),
                    run: this.createRunAnimation(),
                    jump: this.createJumpAnimation(),
                    dance: this.createDanceAnimation(),
                    wave: this.createWaveAnimation(),
                    sit: this.createSitAnimation(),
                    sleep: this.createSleepAnimation(),
                    greet: this.createGreetAnimation(),
                    attack: this.createAttackAnimation(),
                    crouch: this.createCrouchAnimation(),
                    lie: this.createLieAnimation(),
                    stand: this.createStandAnimation(),
                    handshake: this.createHandshakeAnimation(),
                    heart: this.createHeartAnimation(),
                    salute: this.createSaluteAnimation(),
                    pat: this.createPatAnimation(),
                    angry: this.createAngryAnimation(),
                    slideLeft: this.createSlideLeftAnimation(),
                    slideRight: this.createSlideRightAnimation(),
                    follow: this.createFollowAnimation(),
                    patrol: this.createPatrolAnimation()
                };

                this.boneTransforms = {
                    head: { rotation: 0, offsetX: 0, offsetY: 0 },
                    body: { rotation: 0, offsetX: 0, offsetY: 0 },
                    leftArm: { rotation: 0, offsetX: 0, offsetY: 0 },
                    rightArm: { rotation: 0, offsetX: 0, offsetY: 0 },
                    leftLeg: { rotation: 0, offsetX: 0, offsetY: 0 },
                    rightLeg: { rotation: 0, offsetX: 0, offsetY: 0 },
                    tail: { rotation: 0, offsetX: 0, offsetY: 0 },
                    leftEar: { rotation: 0 },
                    rightEar: { rotation: 0 }
                };
            }

            createIdleAnimation() {
                return {
                    duration: 2000,
                    keyframes: [
                        { time: 0, bones: { head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 }, tail: { rotation: 0 }, leftEar: { rotation: 0 }, rightEar: { rotation: 0 } } },
                        { time: 1000, bones: { head: { rotation: -3, offsetY: -1 }, body: { rotation: 0 }, tail: { rotation: 5 }, leftEar: { rotation: -2 }, rightEar: { rotation: 2 } } },
                        { time: 2000, bones: { head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 }, tail: { rotation: 0 }, leftEar: { rotation: 0 }, rightEar: { rotation: 0 } } }
                    ]
                };
            }

            createWalkAnimation() {
                return {
                    duration: 600,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: -20 }, rightLeg: { rotation: 20 }, leftArm: { rotation: 15 }, rightArm: { rotation: -15 }, head: { rotation: -2, offsetY: 0 }, tail: { rotation: 10 } } },
                        { time: 150, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -2 }, tail: { rotation: 0 } } },
                        { time: 300, bones: { leftLeg: { rotation: 20 }, rightLeg: { rotation: -20 }, leftArm: { rotation: -15 }, rightArm: { rotation: 15 }, head: { rotation: 2, offsetY: 0 }, tail: { rotation: -10 } } },
                        { time: 450, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -2 }, tail: { rotation: 0 } } },
                        { time: 600, bones: { leftLeg: { rotation: -20 }, rightLeg: { rotation: 20 }, leftArm: { rotation: 15 }, rightArm: { rotation: -15 }, head: { rotation: -2, offsetY: 0 }, tail: { rotation: 10 } } }
                    ]
                };
            }

            createRunAnimation() {
                return {
                    duration: 400,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: -35 }, rightLeg: { rotation: 35 }, leftArm: { rotation: 25 }, rightArm: { rotation: -25 }, head: { rotation: -5, offsetY: -3 }, body: { rotation: -3 } } },
                        { time: 100, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -6 }, body: { rotation: 0 } } },
                        { time: 200, bones: { leftLeg: { rotation: 35 }, rightLeg: { rotation: -35 }, leftArm: { rotation: -25 }, rightArm: { rotation: 25 }, head: { rotation: 5, offsetY: -3 }, body: { rotation: 3 } } },
                        { time: 300, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -6 }, body: { rotation: 0 } } },
                        { time: 400, bones: { leftLeg: { rotation: -35 }, rightLeg: { rotation: 35 }, leftArm: { rotation: 25 }, rightArm: { rotation: -25 }, head: { rotation: -5, offsetY: -3 }, body: { rotation: -3 } } }
                    ]
                };
            }

            createJumpAnimation() {
                return {
                    duration: 800,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: -15 }, rightLeg: { rotation: -15 }, leftArm: { rotation: -30 }, rightArm: { rotation: -30 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 } } },
                        { time: 200, bones: { leftLeg: { rotation: 45 }, rightLeg: { rotation: 45 }, leftArm: { rotation: -60 }, rightArm: { rotation: -60 }, head: { rotation: 0, offsetY: -15 }, body: { rotation: 0 } } },
                        { time: 400, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -20 }, body: { rotation: 0 } } },
                        { time: 600, bones: { leftLeg: { rotation: -15 }, rightLeg: { rotation: -15 }, leftArm: { rotation: -30 }, rightArm: { rotation: -30 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 } } },
                        { time: 800, bones: { leftLeg: { rotation: -15 }, rightLeg: { rotation: -15 }, leftArm: { rotation: -30 }, rightArm: { rotation: -30 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 } } }
                    ]
                };
            }

            createDanceAnimation() {
                return {
                    duration: 1200,
                    keyframes: [
                        { time: 0, bones: { leftArm: { rotation: -45 }, rightArm: { rotation: 45 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: -10 } } },
                        { time: 300, bones: { leftArm: { rotation: 45 }, rightArm: { rotation: -45 }, head: { rotation: 15, offsetY: -3 }, body: { rotation: 10 } } },
                        { time: 600, bones: { leftArm: { rotation: -90 }, rightArm: { rotation: -90 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: -15 } } },
                        { time: 900, bones: { leftArm: { rotation: 45 }, rightArm: { rotation: 45 }, head: { rotation: -15, offsetY: -3 }, body: { rotation: 15 } } },
                        { time: 1200, bones: { leftArm: { rotation: -45 }, rightArm: { rotation: 45 }, head: { rotation: 0, offsetY: 0 }, body: { rotation: -10 } } }
                    ]
                };
            }

            createWaveAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { rightArm: { rotation: 0 } } },
                        { time: 250, bones: { rightArm: { rotation: -20 } } },
                        { time: 500, bones: { rightArm: { rotation: -90 } } },
                        { time: 750, bones: { rightArm: { rotation: -90 } } },
                        { time: 1000, bones: { rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createSitAnimation() {
                return {
                    duration: 500,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, body: { rotation: 0, offsetY: 0 } } },
                        { time: 250, bones: { leftLeg: { rotation: 60 }, rightLeg: { rotation: 60 }, body: { rotation: 0, offsetY: 5 } } },
                        { time: 500, bones: { leftLeg: { rotation: 60 }, rightLeg: { rotation: 60 }, body: { rotation: 0, offsetY: 5 } } }
                    ]
                };
            }

            createSleepAnimation() {
                return {
                    duration: 3000,
                    keyframes: [
                        { time: 0, bones: { head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 }, leftEar: { rotation: 0 }, rightEar: { rotation: 0 } } },
                        { time: 1500, bones: { head: { rotation: 10, offsetY: 3 }, body: { rotation: 5 }, leftEar: { rotation: -30 }, rightEar: { rotation: -30 } } },
                        { time: 3000, bones: { head: { rotation: 0, offsetY: 0 }, body: { rotation: 0 }, leftEar: { rotation: 0 }, rightEar: { rotation: 0 } } }
                    ]
                };
            }

            createGreetAnimation() {
                return {
                    duration: 1500,
                    keyframes: [
                        { time: 0, bones: { head: { rotation: 0, offsetY: 0 }, rightArm: { rotation: 0 } } },
                        { time: 300, bones: { head: { rotation: -10, offsetY: 0 }, rightArm: { rotation: -30 } } },
                        { time: 600, bones: { head: { rotation: 10, offsetY: 0 }, rightArm: { rotation: -90 } } },
                        { time: 900, bones: { head: { rotation: -10, offsetY: 0 }, rightArm: { rotation: -30 } } },
                        { time: 1200, bones: { head: { rotation: 10, offsetY: 0 }, rightArm: { rotation: -90 } } },
                        { time: 1500, bones: { head: { rotation: 0, offsetY: 0 }, rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createAttackAnimation() {
                return {
                    duration: 600,
                    keyframes: [
                        { time: 0, bones: { head: { rotation: 0, offsetY: 0 }, rightArm: { rotation: 0 }, body: { rotation: 0 } } },
                        { time: 150, bones: { head: { rotation: 20, offsetY: 0 }, rightArm: { rotation: -120 }, body: { rotation: -15 } } },
                        { time: 300, bones: { head: { rotation: -30, offsetY: 0 }, rightArm: { rotation: 60 }, body: { rotation: 20 } } },
                        { time: 450, bones: { head: { rotation: 0, offsetY: 0 }, rightArm: { rotation: 0 }, body: { rotation: 0 } } },
                        { time: 600, bones: { head: { rotation: 0, offsetY: 0 }, rightArm: { rotation: 0 }, body: { rotation: 0 } } }
                    ]
                };
            }

            createCrouchAnimation() {
                return {
                    duration: 500,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, body: { rotation: 0, offsetY: 0 }, head: { rotation: 0, offsetY: 0 } } },

                        { time: 500, bones: { leftLeg: { rotation: 90 }, rightLeg: { rotation: 90 }, body: { rotation: 0, offsetY: 10 }, head: { rotation: 0, offsetY: 5 } } }
                    ]
                };
            }

            createLieAnimation() {
                return {
                    duration: 800,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, body: { rotation: 0, offsetY: 0 }, head: { rotation: 0, offsetY: 0 } } },
                        { time: 400, bones: { leftLeg: { rotation: 120 }, rightLeg: { rotation: 120 }, body: { rotation: 10, offsetY: 15 }, head: { rotation: 20, offsetY: 10 } } },
                        { time: 800, bones: { leftLeg: { rotation: 120 }, rightLeg: { rotation: 120 }, body: { rotation: 10, offsetY: 15 }, head: { rotation: 20, offsetY: 10 } } }
                    ]
                };
            }

            createStandAnimation() {
                return {
                    duration: 500,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: 90 }, rightLeg: { rotation: 90 }, body: { rotation: 0, offsetY: 10 }, head: { rotation: 0, offsetY: 5 } } },
                        { time: 250, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, body: { rotation: 0, offsetY: 0 }, head: { rotation: 0, offsetY: 0 } } },
                        { time: 500, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, body: { rotation: 0, offsetY: 0 }, head: { rotation: 0, offsetY: 0 } } }
                    ]
                };
            }

            createHandshakeAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { rightArm: { rotation: 0 } } },
                        { time: 250, bones: { rightArm: { rotation: -60 } } },
                        { time: 500, bones: { rightArm: { rotation: -30 } } },
                        { time: 750, bones: { rightArm: { rotation: -60 } } },
                        { time: 1000, bones: { rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createHeartAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { leftArm: { rotation: 0 }, rightArm: { rotation: 0 } } },
                        { time: 500, bones: { leftArm: { rotation: -60 }, rightArm: { rotation: -60 } } },
                        { time: 1000, bones: { leftArm: { rotation: 0 }, rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createSaluteAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { rightArm: { rotation: 0 } } },
                        { time: 300, bones: { rightArm: { rotation: -90 } } },
                        { time: 700, bones: { rightArm: { rotation: -90 } } },
                        { time: 1000, bones: { rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createPatAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { rightArm: { rotation: 0 }, head: { rotation: 0 } } },
                        { time: 250, bones: { rightArm: { rotation: -45 }, head: { rotation: -10 } } },
                        { time: 500, bones: { rightArm: { rotation: 0 }, head: { rotation: 0 } } },
                        { time: 750, bones: { rightArm: { rotation: -45 }, head: { rotation: -10 } } },
                        { time: 1000, bones: { rightArm: { rotation: 0 }, head: { rotation: 0 } } }
                    ]
                };
            }

            createAngryAnimation() {
                return {
                    duration: 500,
                    keyframes: [
                        { time: 0, bones: { head: { rotation: 0 }, body: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 } } },
                        { time: 125, bones: { head: { rotation: 10 }, body: { rotation: 5 }, leftArm: { rotation: 20 }, rightArm: { rotation: -20 } } },
                        { time: 250, bones: { head: { rotation: -10 }, body: { rotation: -5 }, leftArm: { rotation: -20 }, rightArm: { rotation: 20 } } },
                        { time: 375, bones: { head: { rotation: 10 }, body: { rotation: 5 }, leftArm: { rotation: 20 }, rightArm: { rotation: -20 } } },
                        { time: 500, bones: { head: { rotation: 0 }, body: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 } } }
                    ]
                };
            }

            createSlideLeftAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { body: { offsetX: 0 } } },
                        { time: 1000, bones: { body: { offsetX: -50 } } }
                    ]
                };
            }

            createSlideRightAnimation() {
                return {
                    duration: 1000,
                    keyframes: [
                        { time: 0, bones: { body: { offsetX: 0 } } },
                        { time: 1000, bones: { body: { offsetX: 50 } } }
                    ]
                };
            }

            createFollowAnimation() {
                return {
                    duration: 2000,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: -15 }, rightLeg: { rotation: 15 }, leftArm: { rotation: 10 }, rightArm: { rotation: -10 }, head: { rotation: -2, offsetY: 0 } } },
                        { time: 500, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -1 } } },
                        { time: 1000, bones: { leftLeg: { rotation: 15 }, rightLeg: { rotation: -15 }, leftArm: { rotation: -10 }, rightArm: { rotation: 10 }, head: { rotation: 2, offsetY: 0 } } },
                        { time: 1500, bones: { leftLeg: { rotation: 0 }, rightLeg: { rotation: 0 }, leftArm: { rotation: 0 }, rightArm: { rotation: 0 }, head: { rotation: 0, offsetY: -1 } } },
                        { time: 2000, bones: { leftLeg: { rotation: -15 }, rightLeg: { rotation: 15 }, leftArm: { rotation: 10 }, rightArm: { rotation: -10 }, head: { rotation: -2, offsetY: 0 } } }
                    ]
                };
            }

            createPatrolAnimation() {
                return {
                    duration: 4000,
                    keyframes: [
                        { time: 0, bones: { leftLeg: { rotation: -20 }, rightLeg: { rotation: 20 }, leftArm: { rotation: 15 }, rightArm: { rotation: -15 }, head: { rotation: -2, offsetY: 0 } } },
                        { time: 1000, bones: { leftLeg: { rotation: 20 }, rightLeg: { rotation: -20 }, leftArm: { rotation: -15 }, rightArm: { rotation: 15 }, head: { rotation: 2, offsetY: 0 } } },
                        { time: 2000, bones: { leftLeg: { rotation: -20 }, rightLeg: { rotation: 20 }, leftArm: { rotation: 15 }, rightArm: { rotation: -15 }, head: { rotation: -2, offsetY: 0 } } },
                        { time: 3000, bones: { leftLeg: { rotation: 20 }, rightLeg: { rotation: -20 }, leftArm: { rotation: -15 }, rightArm: { rotation: 15 }, head: { rotation: 2, offsetY: 0 } } },
                        { time: 4000, bones: { leftLeg: { rotation: -20 }, rightLeg: { rotation: 20 }, leftArm: { rotation: 15 }, rightArm: { rotation: -15 }, head: { rotation: -2, offsetY: 0 } } }
                    ]
                };
            }

            interpolateKeyframes(keyframes, time) {
                if (keyframes.length === 0) return {};
                if (keyframes.length === 1) return keyframes[0].bones;

                let fromKeyframe = keyframes[0];
                let toKeyframe = keyframes[keyframes.length - 1];

                for (let i = 0; i < keyframes.length - 1; i++) {
                    if (time >= keyframes[i].time && time <= keyframes[i + 1].time) {
                        fromKeyframe = keyframes[i];
                        toKeyframe = keyframes[i + 1];
                        break;
                    }
                }

                const duration = toKeyframe.time - fromKeyframe.time;
                const elapsed = time - fromKeyframe.time;
                const t = duration > 0 ? elapsed / duration : 0;
                const eased = this.easeInOutCubic(t);

                const result = {};
                const bones = ['head', 'body', 'leftArm', 'rightArm', 'leftLeg', 'rightLeg', 'tail', 'leftEar', 'rightEar'];

                bones.forEach(bone => {
                    if (fromKeyframe.bones[bone] && toKeyframe.bones[bone]) {
                        result[bone] = {};
                        Object.keys(fromKeyframe.bones[bone]).forEach(prop => {
                            const from = fromKeyframe.bones[bone][prop];
                            const to = toKeyframe.bones[bone][prop];
                            result[bone][prop] = from + (to - from) * eased;
                        });
                    }
                });

                return result;
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            lerp(a, b, t) {
                return a + (b - a) * t;
            }

            blendTo(animationName, duration) {
                if (!this.animations[animationName]) return;
                this.blendFrom = { ...this.boneTransforms };
                this.blendDuration = duration;
                this.blendProgress = 0;
                this.currentAnimation = animationName;
            }

            play(animationName) {
                if (!this.animations[animationName]) return;
                this.currentAnimation = animationName;
                this.animationProgress = 0;
                this.blendProgress = 1;
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.lastTime = performance.now();
                this.tick();
            }

            startLoop() {
                this.start();
            }

            stopLoop() {
                this.stop();
            }

            stop() {
                this.isRunning = false;
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                    this.animationFrame = null;
                }
            }

            tick() {
                if (!this.isRunning) return;

                const currentTime = performance.now();
                const deltaTime = (currentTime - this.lastTime) * this.animationSpeed;
                this.lastTime = currentTime;

                if (this.currentAnimation && this.animations[this.currentAnimation]) {
                    const animation = this.animations[this.currentAnimation];
                    this.animationProgress += deltaTime;

                    if (this.animationProgress >= animation.duration) {
                        this.animationProgress = this.animationProgress % animation.duration;
                    }

                    const targetBones = this.interpolateKeyframes(animation.keyframes, this.animationProgress);

                    if (this.blendProgress < 1 && this.blendFrom) {
                        this.blendProgress = Math.min(1, this.blendProgress + (deltaTime / this.animationSpeed) / this.blendDuration);
                        const t = this.easeInOutCubic(this.blendProgress);

                        Object.keys(targetBones).forEach(bone => {
                            if (this.boneTransforms[bone]) {
                                Object.keys(targetBones[bone]).forEach(prop => {
                                    const from = this.blendFrom[bone]?.[prop] || 0;
                                    const to = targetBones[bone][prop];
                                    this.boneTransforms[bone][prop] = this.lerp(from, to, t);
                                });
                            }
                        });
                    } else {
                        Object.keys(targetBones).forEach(bone => {
                            if (this.boneTransforms[bone]) {
                                Object.keys(targetBones[bone]).forEach(prop => {
                                    this.boneTransforms[bone][prop] = targetBones[bone][prop];
                                });
                            }
                        });
                    }

                    this.applyTransforms();
                }

                this.animationFrame = requestAnimationFrame(() => this.tick());
            }

            applyTransforms() {
                const e = this.elements;
                const t = this.boneTransforms;
                const amp = this.animationAmplitude;

                const getAmplitudeMultiplier = (baseAmp, defaultAmp) => {
                    return baseAmp / defaultAmp;
                };

                if (e.petHead) {
                    const headAmp = getAmplitudeMultiplier(amp.head, 15);
                    e.petHead.style.transform = `translateX(-50%) translateY(${t.head.offsetY || 0}px) rotate(${t.head.rotation * headAmp / 15}deg)`;
                }
                if (e.petBody) {
                    e.petBody.style.transform = `translateX(-50%) rotate(${t.body.rotation || 0}deg)`;
                }
                if (e.petLeftArm) {
                    const armAmp = getAmplitudeMultiplier(amp.arm, 25);
                    e.petLeftArm.style.transform = `rotate(${t.leftArm.rotation * armAmp / 25}deg)`;
                }
                if (e.petRightArm) {
                    const armAmp = getAmplitudeMultiplier(amp.arm, 25);
                    e.petRightArm.style.transform = `rotate(${t.rightArm.rotation * armAmp / 25}deg)`;
                }
                if (e.petLeftLeg) {
                    const legAmp = getAmplitudeMultiplier(amp.leg, 25);
                    e.petLeftLeg.style.transform = `rotate(${t.leftLeg.rotation * legAmp / 25}deg)`;
                }
                if (e.petRightLeg) {
                    const legAmp = getAmplitudeMultiplier(amp.leg, 25);
                    e.petRightLeg.style.transform = `rotate(${t.rightLeg.rotation * legAmp / 25}deg)`;
                }
                if (e.petTail) {
                    const tailAmp = getAmplitudeMultiplier(amp.tail, 20);
                    e.petTail.style.transform = `rotate(${t.tail.rotation * tailAmp / 20}deg)`;
                }
                if (e.petLeftEar) {
                    e.petLeftEar.style.transform = `rotate(${-15 + (t.leftEar.rotation || 0)}deg)`;
                }
                if (e.petRightEar) {
                    e.petRightEar.style.transform = `rotate(${15 + (t.rightEar.rotation || 0)}deg)`;
                }
            }

            setBoneTransform(bone, transform) {
                if (this.boneTransforms[bone]) {
                    Object.assign(this.boneTransforms[bone], transform);
                }
            }

            getBoneTransform(bone) {
                return this.boneTransforms[bone] || {};
            }

            resetBones() {
                Object.keys(this.boneTransforms).forEach(bone => {
                    this.boneTransforms[bone] = { rotation: 0, offsetX: 0, offsetY: 0 };
                });
                if (this.elements.petLeftEar) this.elements.petLeftEar.style.transform = 'rotate(-15deg)';
                if (this.elements.petRightEar) this.elements.petRightEar.style.transform = 'rotate(15deg)';
            }
        }

                        petContainer.style.left = (startLeft + deltaX) + 'px';
                        petContainer.style.top = (startTop + deltaY) + 'px';
                    });

                            this.handleCommand(command);

                    this.adjustPetPosition();
                });

            adjustPetPosition() {
                const petContainer = this.elements.petContainer;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // 确保宠物不会超出屏幕边界
                let currentLeft = parseInt(petContainer.style.left || '80%');
                let currentTop = parseInt(petContainer.style.top || '80%');
                
                // 转换百分比为像素
                if (typeof currentLeft === 'string' && currentLeft.includes('%')) {
                    currentLeft = (parseInt(currentLeft) / 100) * windowWidth;
                }
                if (typeof currentTop === 'string' && currentTop.includes('%')) {
                    currentTop = (parseInt(currentTop) / 100) * windowHeight;
                }
                
                // 确保宠物在屏幕内
                const petWidth = petContainer.offsetWidth;
                const petHeight = petContainer.offsetHeight;
                
                currentLeft = Math.max(0, Math.min(currentLeft, windowWidth - petWidth));
                currentTop = Math.max(0, Math.min(currentTop, windowHeight - petHeight));
                
                petContainer.style.left = currentLeft + 'px';
                petContainer.style.top = currentTop + 'px';
                
                // 保存新位置
                this.storage.save(Constants.STORAGE_KEYS.PET_POSITION, {
                    left: petContainer.style.left,
                    top: petContainer.style.top
                });
            }
            
            checkSpeechSupport() {
                // 检查浏览器是否支持语音识别
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    // 隐藏语音按钮
                    this.elements.petVoiceBtn.style.display = 'none';
                } else {
                    // 初始化语音识别
                    this.recognizer = new SpeechRecognition();
                    this.recognizer.lang = 'zh-CN';
                    this.recognizer.continuous = false;
                    this.recognizer.interimResults = false;
                    
                    this.recognizer.onresult = (event) => {
                        clearTimeout(this.recognitionTimeout);
                        const transcript = event.results[0][0].transcript;
                        this.handleCommand(transcript);
                        this.stopVoiceRecognition();
                    };
                    
                    this.recognizer.onerror = (event) => {
                        clearTimeout(this.recognitionTimeout);
                        this.stopVoiceRecognition();
                        if (event.error === 'not-allowed') {
                            this.showBubble('请允许麦克风权限');
                        }
                    };
                    
                    this.recognizer.onend = () => {
                        this.stopVoiceRecognition();
                    };
                }
            }
            
            startVoiceRecognition() {
                if (!this.recognizer) return;
                
                try {
                    this.isListening = true;
                    this.elements.petVoiceBtn.style.animation = 'pulse 1s infinite';
                    this.showBubble('正在听...');
                    
                    // 设置3秒超时
                    this.recognitionTimeout = setTimeout(() => {
                        this.stopVoiceRecognition();
                        this.showBubble('没听清，试试说：跳舞、转圈、打招呼、坐下');
                    }, 3000);
                    
                    this.recognizer.start();
                } catch (error) {
                    this.stopVoiceRecognition();
                    this.showBubble('请允许麦克风权限');
                }
            }
            
            stopVoiceRecognition() {
                if (!this.recognizer) return;
                
                this.isListening = false;
                this.elements.petVoiceBtn.style.animation = '';
                clearTimeout(this.recognitionTimeout);
                
                try {
                    this.recognizer.stop();
                } catch (error) {
                    // 忽略错误
                }
            }
            
            handleCommand(command) {
                const lowerCommand = command.toLowerCase();
                
                // 解析动作序列
                const actions = this.parseCommand(lowerCommand);
                
                if (actions.length > 0) {
                    // 执行动作序列
                    actions.forEach(action => {
                        this.executeAction(action);
                    });
                } else {
                    this.showBubble('我不明白你说什么，试试说：跳舞、转圈、打招呼、坐下');
                }
            }
            
            parseCommand(command) {
                const actions = [];
                const actionKeywords = {
                    'dance': ['跳舞', 'dance'],
                    'circle': ['转圈', 'circle', '转圈圈'],
                    'greet': ['打招呼', 'greet', '你好', 'hi', 'hello'],
                    'sit': ['坐下', 'sit'],
                    'crouch': ['蹲下', 'crouch', '蹲'],
                    'lie': ['趴下', 'lie', '卧倒', '仰卧'],
                    'stand': ['站立', 'stand', '起来'],
                    'handshake': ['握手', 'hand', '握手手'],
                    'heart': ['比心', 'heart', '爱心'],
                    'salute': ['敬礼', 'salute'],
                    'pat': ['摸头', 'head', '摸摸头'],
                    'angry': ['生气', 'angry', '发怒'],
                    'jump': ['跳跃', 'jump', '跳'],
                    'slideLeft': ['左滑', 'left', '向左滑'],
                    'slideRight': ['右滑', 'right', '向右滑'],
                    'follow': ['跟随', 'follow', '过来'],
                    'walk': ['走路', 'walk', '散步'],
                    'patrol': ['巡逻', 'patrol']
                };
                
                // 分割指令，支持动作序列
                const commandParts = command.split(/[，。！？；]/).filter(part => part.trim() !== '');
                
                commandParts.forEach(part => {
                    // 检查是否包含动作关键词
                    for (const [action, keywords] of Object.entries(actionKeywords)) {
                        if (keywords.some(keyword => part.includes(keyword))) {
                            actions.push(action);
                            break;
                        }
                    }
                });
                
                return actions;
            }
            
            executeAction(action) {
                // 将动作添加到队列
                this.actionQueue.push(action);
                
                // 如果没有正在执行的动作，开始执行队列
                if (!this.isExecutingAction) {
                    this.processActionQueue();
                }
            }
            
            async processActionQueue() {
                if (this.actionQueue.length === 0) {
                    this.isExecutingAction = false;
                    return;
                }
                
                this.isExecutingAction = true;
                const action = this.actionQueue.shift();
                
                try {
                    // 使用requestAnimationFrame确保动画在浏览器渲染周期中执行
                    await new Promise(resolve => {
                        requestAnimationFrame(async () => {
                            await this.executeActionAsync(action);
                            resolve();
                        });
                    });
                } catch (error) {
                    console.error('执行动作失败:', error);
                } finally {
                    // 继续处理下一个动作
                    this.processActionQueue();
                }
            }
            
            executeActionAsync(action) {
                return new Promise((resolve) => {
                    if (this.skeleton && this.stateMachine) {
                        this.stateMachine.setState(action);
                        this.showBubble(this.getActionMessage(action));
                        
                        // 获取动画持续时间
                        const animation = this.skeleton.animations[action];
                        const duration = animation ? animation.duration + 1000 : 2000;
                        
                        setTimeout(() => {
                            this.stateMachine.setState('idle');
                            if (resolve) resolve();
                        }, duration);
                    } else {
                        if (resolve) resolve();
                    }
                });
            }

            getActionMessage(action) {
                const messages = {
                    dance: '跳舞啦！',
                    circle: '转圈啦！',
                    greet: '你好呀！',
                    sit: '我坐下啦！',
                    crouch: '蹲下啦！',
                    lie: '趴下休息啦！',
                    stand: '站立起来！',
                    handshake: '握握手！',
                    heart: '比心给你！',
                    salute: '敬礼！',
                    pat: '摸头好舒服！',
                    angry: '生气啦！',
                    jump: '跳高高！',
                    slideLeft: '向左滑！',
                    slideRight: '向右滑！',
                    follow: '跟随主人！',
                    walk: '开始散步！',
                    patrol: '巡逻中...'
                };
                return messages[action] || '执行动作中...';
            }

            showBubble(message) {
                // 添加到消息队列
                this.messageQueue.push(message);
                
                // 如果当前没有显示气泡，开始显示
                if (!this.isShowingBubble) {
                    this.processMessageQueue();
                }
            }

            processMessageQueue() {
                if (this.messageQueue.length === 0) {
                    this.isShowingBubble = false;
                    return;
                }

                this.isShowingBubble = true;
                const message = this.messageQueue.shift();
                
                this.elements.petBubble.textContent = message;
                this.elements.petBubble.style.display = 'block';
                this.elements.petBubble.style.opacity = '0';
                this.elements.petBubble.style.transform = 'scale(0.8) translateY(10px)';
                
                // 添加点击关闭功能
                const closeBubble = () => {
                    this.elements.petBubble.style.opacity = '0';
                    this.elements.petBubble.style.transform = 'scale(0.8) translateY(10px)';
                    setTimeout(() => {
                        this.elements.petBubble.style.display = 'none';
                        this.elements.petBubble.style.opacity = '';
                        this.elements.petBubble.style.transform = '';
                        this.elements.petBubble.removeEventListener('click', closeBubble);
                        // 处理下一条消息
                        this.processMessageQueue();
                    }, 300);
                };

                this.elements.petBubble.addEventListener('click', closeBubble);
                
                // 打开动画
                setTimeout(() => {
                    this.elements.petBubble.style.opacity = '1';
                    this.elements.petBubble.style.transform = 'scale(1) translateY(0)';
                }, 10);
                
                // 自动关闭（如果用户没有点击）
                setTimeout(() => {
                    if (this.elements.petBubble.style.display === 'block') {
                        closeBubble();
                    }
                }, 5000);
            }
            
            togglePetWindow() {
                if (this.elements.petWindow.style.display === 'none' || this.elements.petWindow.style.display === '') {
                    // 添加打开动画
                    this.elements.petWindow.style.display = 'block';
                    this.elements.petWindow.style.opacity = '0';
                    this.elements.petWindow.style.transform = 'scale(0.8) translateY(20px)';
                    setTimeout(() => {
                        this.elements.petWindow.style.opacity = '1';
                        this.elements.petWindow.style.transform = 'scale(1) translateY(0)';
                    }, 10);
                } else {
                    // 添加关闭动画
                    this.elements.petWindow.style.opacity = '0';
                    this.elements.petWindow.style.transform = 'scale(0.8) translateY(20px)';
                    setTimeout(() => {
                        this.elements.petWindow.style.display = 'none';
                        this.elements.petWindow.style.opacity = '';
                        this.elements.petWindow.style.transform = '';
                    }, 200);
                }
            }
            
            loadPetConfig() {
                try {
                    const savedPosition = this.storage.load(Constants.STORAGE_KEYS.PET_POSITION, null);
                    if (savedPosition) {
                        const petContainer = this.elements.petContainer;
                        petContainer.style.left = savedPosition.left || '80%';
                        petContainer.style.top = savedPosition.top || '80%';
                    }
                } catch (error) {
                    console.error('加载宠物配置失败:', error);
                }
            }
        }

    // 初始化宠物模块
    const petModule = new PetModule();
    // 不再调用 App.init()，主脚本会负责初始化
</script>
