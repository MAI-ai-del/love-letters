<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三行情书 · 提名墙（完整版）</title>
    <!-- Supabase 客户端库 (唯一引入) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 手写字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff9f7 0%, #ffeef2 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1300px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #b13e5c;
            text-shadow: 3px 3px 0 rgba(255,200,210,0.5);
        }
        .auth-buttons {
            display: flex;
            gap: 1rem;
        }
        .auth-btn {
            background: #ffe2e8;
            border: 1px solid #ffb6c1;
            color: #a1314b;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }
        .auth-btn:hover {
            background: #ffd5de;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            border: 1px solid #ffb6c1;
        }
        .user-email {
            color: #b13e5c;
            font-weight: 500;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #a1314b;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            max-width: 400px;
            width: 90%;
            position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #b13e5c;
            transition: transform 0.2s ease;
        }
        .modal-close:hover {
            transform: rotate(90deg);
        }
        .modal h2 {
            font-family: 'Dancing Script', cursive;
            color: #b54864;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #ffc1ce;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s ease;
        }
        .modal-input:focus {
            outline: none;
            border-color: #ff8da1;
        }
        .modal-btn {
            background: #b13e5c;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            transition: background-color 0.2s ease;
        }
        .modal-btn:hover {
            background: #9e3550;
        }
        .modal-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: #7a4b5c;
        }
        .modal-switch span {
            color: #b13e5c;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s ease;
        }
        .modal-switch span:hover {
            color: #9e3550;
        }
        .error-message {
            color: #d63031;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            border: none;
            font-size: 1.3rem;
            padding: 0.6rem 2.2rem;
            border-radius: 40px;
            cursor: pointer;
            background: rgba(255,255,255,0.7);
            border: 1px solid #ffb6c1;
            color: #a1314b;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #b13e5c;
            color: white;
            border-color: #b13e5c;
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
        }
        .search-box input {
            width: 60%;
            max-width: 500px;
            padding: 0.9rem 1.8rem;
            border: 2px solid #ffc1ce;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
            transition: border-color 0.2s ease;
        }
        .search-box input:focus {
            outline: none;
            border-color: #ff8da1;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 2rem 1.8rem 1.8rem;
            box-shadow: 0 25px 35px -12px rgba(180,100,120,0.4);
            border: 1px solid rgba(255,230,235,0.8);
            transition: 0.3s;
            position: relative;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 45px -15px rgba(180,100,120,0.5);
        }
        .delete-btn {
            position: absolute;
            top: 16px;
            right: 18px;
            background: #fff0f3;
            border: 1px solid #ffb3c1;
            color: #b84c64;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            background: #ffdbdf;
            transform: scale(1.1) rotate(90deg);
        }
        .lines {
            margin: 0.8rem 0 1.2rem;
        }
        .line {
            font-size: 1.4rem;
            line-height: 2.2rem;
            color: #3f2d34;
            margin-bottom: 0.3rem;
            display: flex;
            gap: 8px;
            word-break: break-word;
        }
        .line::before {
            content: "❤️";
            font-size: 1rem;
            opacity: 0.6;
            margin-right: 4px;
        }
        .story-toggle-btn {
            background: #ffe2e8;
            border: 1px solid #ffb6c1;
            color: #a1314b;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0.5rem 0 0.8rem;
            align-self: flex-start;
            transition: background-color 0.2s ease;
        }
        .story-toggle-btn:hover {
            background: #ffd5de;
        }
        .story-content {
            margin: 0.5rem 0 1rem;
            padding: 1rem;
            background: rgba(255,240,240,0.5);
            border-radius: 24px;
            font-size: 1rem;
            border-left: 4px solid #ffb6c1;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .story-text {
            margin-bottom: 0.8rem;
        }
        .story-text strong {
            color: #bc4e6b;
            margin-right: 6px;
        }
        .story-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin-top: 0.5rem;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .story-image:hover {
            transform: scale(1.05);
        }
        .vote-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .vote-btn {
            background: #ffb6cb;
            border: none;
            color: #4e2d37;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #ff9eb0;
            transition: all 0.2s ease;
        }
        .vote-btn:hover {
            background: #ffa5bc;
            transform: scale(1.02);
        }
        .vote-btn:disabled {
            background: #f0d0d8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .vote-count {
            font-size: 1.2rem;
            font-weight: 700;
            color: #b13e5c;
            background: rgba(255,220,230,0.6);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #ffb6c1;
        }
        .add-form {
            background: rgba(255,250,252,0.9);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2.5rem;
            border: 1px solid #ffd9df;
            margin-top: 2rem;
        }
        .add-form h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #b54864;
            margin-bottom: 1.8rem;
            text-align: center;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .input-wrapper {
            flex: 1 1 180px;
            position: relative;
        }
        .input-line {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #ffc1ce;
            border-radius: 50px;
            font-size: 1rem;
            padding-right: 3.5rem;
            transition: border-color 0.2s ease;
        }
        .input-line:focus {
            border-color: #ff8da1;
            outline: none;
        }
        .char-counter {
            position: absolute;
            right: 12px;
            bottom: 10px;
            font-size: 0.8rem;
            color: #b18d99;
            background: rgba(255,255,255,0.7);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
        }
        .story-wrapper {
            position: relative;
            margin: 1rem 0 1.8rem;
        }
        .story-textarea {
            width: 100%;
            padding: 1.2rem 1.8rem;
            border: 2px solid #ffc1ce;
            border-radius: 40px;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            padding-bottom: 2.5rem;
            transition: border-color 0.2s ease;
        }
        .story-textarea:focus {
            border-color: #ff8da1;
            outline: none;
        }
        .story-counter {
            position: absolute;
            right: 15px;
            bottom: 10px;
            font-size: 0.85rem;
            color: #b18d99;
            background: rgba(255,255,255,0.8);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .file-upload {
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .file-label {
            background: #ffe2e8;
            border: 1px solid #ffb6c1;
            color: #a1314b;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s ease;
        }
        .file-label:hover {
            background: #ffd5de;
        }
        .file-label input {
            display: none;
        }
        .file-name {
            color: #7a4b5c;
            font-size: 0.95rem;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn-submit {
            background: #b13e5c;
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 0 #7a2b41;
            transition: 0.1s;
        }
        .btn-submit:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #7a2b41;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-prompt {
            text-align: center;
            margin: 1rem 0;
            color: #a06677;
        }
        .login-prompt a {
            color: #b13e5c;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s ease;
        }
        .login-prompt a:hover {
            color: #9e3550;
        }
        .status {
            text-align: center;
            margin: 2rem 0;
            color: #a06677;
        }
        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255,244,240,0.8);
            border-radius: 80px;
            border: 2px dashed #feb6c7;
            color: #a1596e;
            font-size: 1.8rem;
            font-family: 'Dancing Script', cursive;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 3rem;
            background: rgba(255,250,252,0.8);
            border-radius: 40px;
            margin: 2rem 0;
        }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #ffc1ce;
            border-top: 3px solid #b13e5c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: #a1314b;
            font-size: 1.1rem;
            font-weight: 600;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2.5rem;
                text-align: center;
                width: 100%;
                margin-bottom: 1rem;
            }
            .auth-buttons {
                width: 100%;
                justify-content: center;
            }
            .tabs {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            .tab-btn {
                width: 80%;
                max-width: 200px;
            }
            .sort-section {
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
            }
            .sort-section label {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .search-box input {
                width: 90%;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .form-row {
                flex-direction: column;
            }
            .input-wrapper {
                flex: 1 1 100%;
            }
            .add-form {
                padding: 1.5rem;
            }
            .file-upload {
                flex-direction: column;
                align-items: flex-start;
            }
            .file-label {
                width: 100%;
                justify-content: center;
            }
            .vote-section {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            .vote-btn {
                width: 100%;
                text-align: center;
            }
            .vote-count {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>三行情书 · 提名墙</h1>
        <div id="authSection">
            <!-- 游客模式 -->
            <div class="auth-buttons" id="guestSection" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <div id="guestNameDisplay" style="font-size: 1.2rem; color: #a1314b; font-weight: 600;">游客</div>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="guestNameInput" placeholder="输入你的昵称" style="padding: 0.8rem 1.2rem; border: 1px solid #ffb6c1; border-radius: 20px; font-size: 1rem;">
                    <button id="setGuestNameBtn" class="auth-btn" style="padding: 0.8rem 1.5rem;">设置昵称</button>
                </div>
            </div>
            <!-- 登录按钮（备用） -->
            <div class="auth-buttons" id="loginButtons" style="display: none;">
                <button class="auth-btn" id="defaultLoginBtn">登录</button>
                <button class="auth-btn" id="defaultRegisterBtn">注册</button>
            </div>
        </div>
    </div>

    <!-- 登录/注册模态框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h2 id="modalTitle">登录</h2>
            <div id="errorMsg" class="error-message"></div>
            <input type="email" id="emailInput" class="modal-input" placeholder="电子邮箱" required>
            <input type="password" id="passwordInput" class="modal-input" placeholder="密码" required>
            <button id="modalActionBtn" class="modal-btn">登录</button>
            <div class="modal-switch">
                <span id="switchText">还没有账号？注册</span>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabHome">🏆 首页推荐</button>
        <button class="tab-btn" id="tabAll">📚 全部情书库</button>
    </div>
    
    <div class="sort-section" id="sortSection" style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; display: none;">
        <label style="display: flex; align-items: center; gap: 0.5rem; color: #a1314b;">
            排序方式：
            <select id="sortSelect" style="padding: 0.5rem; border: 1px solid #ffb6c1; border-radius: 20px; background: white; color: #a1314b;">
                <option value="newest">最新发布</option>
                <option value="most_voted">最多提名</option>
            </select>
        </label>
    </div>

    <div class="search-box" id="searchBox" style="display: none;">
        <input type="text" id="searchInput" placeholder="🔍 搜索情书内容或故事...">
    </div>

    <div id="cardContainer" class="card-grid">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>
    </div>

    <!-- 发布表单（登录后显示） -->
    <div id="postSection" style="display: none;">
        <div class="add-form">
            <h2>✍️ 写下你的三行情书</h2>
            <form id="addForm">
                <div class="form-row">
                    <div class="input-wrapper">
                        <input type="text" class="input-line" id="line1" placeholder="第一行 · 遇见" maxlength="20" required>
                        <span class="char-counter" id="line1Counter">0/20</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" class="input-line" id="line2" placeholder="第二行 · 心动" maxlength="20" required>
                        <span class="char-counter" id="line2Counter">0/20</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" class="input-line" id="line3" placeholder="第三行 · 永恒" maxlength="20" required>
                        <span class="char-counter" id="line3Counter">0/20</span>
                    </div>
                </div>
                <div class="story-wrapper">
                    <textarea class="story-textarea" id="story" placeholder="背后的故事（可选）" maxlength="200"></textarea>
                    <span class="story-counter" id="storyCounter">0/200</span>
                </div>
                <div class="file-upload">
                    <label class="file-label">
                        📷 选择图片（可选）
                        <input type="file" id="imageUpload" accept="image/*">
                    </label>
                    <span class="file-name" id="fileName">未选择文件</span>
                </div>
                <div style="text-align: center;">
                    <button type="submit" class="btn-submit" id="submitBtn">💌 发布情书</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 未登录提示 -->
    <div id="loginPromptSection" style="display: none;" class="login-prompt">
        ✨ <a id="showLoginBtn">登录</a> 后即可发布你的三行情书 ✨
    </div>
</div>

<script>
    // 模块化代码结构
    const App = {
        // 配置
        config: {
            supabaseUrl: 'https://bpqeobftxvmslewlvilh.supabase.co', // 请替换为你的实际 Supabase 项目 URL
            supabaseAnonKey: 'sb_publishable_rnojR79Cx6vfxDfUWYN-Zg_egc2rO17', // 请替换为你的实际密钥
            storageBucket: 'loveimages',
            tableName: 'loveletters',
            pageSize: 9,
            guestMode: true // 启用游客模式
        },
        
        // 状态
        state: {
            currentMode: 'home',
            votedIds: new Set(),
            currentUser: null,
            isLoading: false,
            currentPage: 1,
            sortBy: 'newest',
            errorLog: [],
            // 游客模式
            guestId: null,
            guestName: ''
        },
        
        // DOM 元素
        elements: {
            // 主要区域
            authSection: document.getElementById('authSection'),
            postSection: document.getElementById('postSection'),
            loginPromptSection: document.getElementById('loginPromptSection'),
            cardContainer: document.getElementById('cardContainer'),
            tabHome: document.getElementById('tabHome'),
            tabAll: document.getElementById('tabAll'),
            searchBox: document.getElementById('searchBox'),
            searchInput: document.getElementById('searchInput'),
            sortSection: document.getElementById('sortSection'),
            sortSelect: document.getElementById('sortSelect'),
            addForm: document.getElementById('addForm'),
            
            // 表单元素
            line1Input: document.getElementById('line1'),
            line2Input: document.getElementById('line2'),
            line3Input: document.getElementById('line3'),
            storyInput: document.getElementById('story'),
            imageUpload: document.getElementById('imageUpload'),
            fileName: document.getElementById('fileName'),
            submitBtn: document.getElementById('submitBtn'),
            
            // 计数器
            line1Counter: document.getElementById('line1Counter'),
            line2Counter: document.getElementById('line2Counter'),
            line3Counter: document.getElementById('line3Counter'),
            storyCounter: document.getElementById('storyCounter'),
            
            // 其他
            showLoginBtn: document.getElementById('showLoginBtn'),
            
            // 游客模式元素
            guestNameInput: document.getElementById('guestNameInput'),
            setGuestNameBtn: document.getElementById('setGuestNameBtn'),
            guestNameDisplay: document.getElementById('guestNameDisplay'),
            
            // 模态框
            authModal: document.getElementById('authModal'),
            modalClose: document.getElementById('modalClose'),
            modalTitle: document.getElementById('modalTitle'),
            emailInput: document.getElementById('emailInput'),
            passwordInput: document.getElementById('passwordInput'),
            modalActionBtn: document.getElementById('modalActionBtn'),
            switchText: document.getElementById('switchText'),
            errorMsg: document.getElementById('errorMsg'),
            
            // 备用默认按钮
            defaultLoginBtn: document.getElementById('defaultLoginBtn'),
            defaultRegisterBtn: document.getElementById('defaultRegisterBtn')
        },
        
        // 初始化
        async init() {
            try {
                // 检查 Supabase 配置
                if (!this.checkSupabaseConfig()) {
                    // 显示配置提示
                    this.elements.cardContainer.innerHTML = `
                        <div class="no-data">
                            ⚙️ 请先配置 Supabase 项目信息<br>
                            在 App.config 中填写你的 Supabase URL 和密钥
                        </div>
                    `
                    return
                }
                
                // 初始化 Supabase 客户端
                this.supabase = window.supabase.createClient(
                    this.config.supabaseUrl,
                    this.config.supabaseAnonKey
                )
                
                // 加载本地提名记录
                this.loadVotedIds()
                
                // 初始化游客模式
                this.initGuestMode()
                
                // 绑定事件
                this.bindEvents()
                
                // 初始化 UI
                this.updateAuthUI(null)
                
                // 获取初始用户（如果不是游客模式）
                if (!this.config.guestMode) {
                    await this.fetchCurrentUser()
                }
                
                // 加载数据
                this.loadData('home')
                
                // 更新计数器
                this.updateCounters()
                
                // 后备：如果初始加载后按钮仍未出现，手动触发一次未登录 UI
                setTimeout(() => {
                    if (!this.state.currentUser && !this.config.guestMode) {
                        this.updateAuthUI(null)
                    }
                }, 1000)
            } catch (error) {
                this.logError(error, '初始化')
                this.showError('初始化失败，请刷新页面重试')
            }
        },
        
        // 初始化游客模式
        initGuestMode() {
            if (this.config.guestMode) {
                // 从本地存储获取游客 ID
                let guestId = localStorage.getItem('guestId')
                if (!guestId) {
                    // 生成新的游客 ID
                    guestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
                    localStorage.setItem('guestId', guestId)
                }
                this.state.guestId = guestId
                
                // 从本地存储获取游客名称
                const guestName = localStorage.getItem('guestName')
                if (guestName) {
                    this.state.guestName = guestName
                }
                
                // 更新游客名称显示
                this.updateGuestNameDisplay()
            }
        },
        
        // 设置游客名称
        setGuestName(name) {
            if (!name || name.trim() === '') {
                alert('请输入昵称')
                return
            }
            
            if (name.length > 20) {
                alert('昵称不能超过20个字符')
                return
            }
            
            this.state.guestName = name.trim()
            localStorage.setItem('guestName', this.state.guestName)
            this.updateGuestNameDisplay()
            alert('昵称设置成功')
        },
        
        // 更新游客名称显示
        updateGuestNameDisplay() {
            if (this.elements.guestNameDisplay) {
                this.elements.guestNameDisplay.textContent = this.state.guestName || '游客'
            }
        },
        
        // 错误日志
        logError(error, context) {
            const errorObj = {
                timestamp: new Date().toISOString(),
                error: error.message || error,
                context: context,
                user: this.state.currentUser ? this.state.currentUser.email : 'anonymous'
            }
            this.state.errorLog.push(errorObj)
            console.error(`[${context}]`, error)
            
            // 限制错误日志大小
            if (this.state.errorLog.length > 50) {
                this.state.errorLog.shift()
            }
        },
        
        // 加载本地提名记录
        loadVotedIds() {
            try {
                const stored = localStorage.getItem('votedLoveLetters')
                if (stored) {
                    this.state.votedIds = new Set(JSON.parse(stored))
                }
            } catch (error) {
                this.logError(error, '加载本地提名记录')
                this.state.votedIds = new Set()
            }
        },
        
        // 保存本地提名记录
        saveVotedIds() {
            try {
                localStorage.setItem('votedLoveLetters', JSON.stringify([...this.state.votedIds]))
            } catch (error) {
                this.logError(error, '保存本地提名记录')
            }
        },
        
        // 绑定事件
        bindEvents() {
            // 游客模式事件
            if (this.config.guestMode) {
                if (this.elements.setGuestNameBtn) {
                    this.elements.setGuestNameBtn.addEventListener('click', () => {
                        const name = this.elements.guestNameInput.value
                        this.setGuestName(name)
                    })
                }
                if (this.elements.guestNameInput) {
                    this.elements.guestNameInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const name = this.elements.guestNameInput.value
                            this.setGuestName(name)
                        }
                    })
                }
            }
            
            // 备用默认按钮
            if (this.elements.defaultLoginBtn) {
                this.elements.defaultLoginBtn.addEventListener('click', () => this.openModal('login'))
            }
            if (this.elements.defaultRegisterBtn) {
                this.elements.defaultRegisterBtn.addEventListener('click', () => this.openModal('register'))
            }
            
            // 字数统计
            this.elements.line1Input.addEventListener('input', () => this.updateCounters())
            this.elements.line2Input.addEventListener('input', () => this.updateCounters())
            this.elements.line3Input.addEventListener('input', () => this.updateCounters())
            this.elements.storyInput.addEventListener('input', () => this.updateCounters())
            
            // 文件上传
            this.elements.imageUpload.addEventListener('change', (e) => {
                this.elements.fileName.textContent = e.target.files.length ? e.target.files[0].name : '未选择文件'
            })
            
            // 模态框
            this.elements.modalClose.addEventListener('click', () => this.closeModal())
            window.addEventListener('click', (e) => {
                if (e.target === this.elements.authModal) this.closeModal()
            })
            this.elements.switchText.addEventListener('click', () => {
                const isLogin = this.elements.modalTitle.textContent === '登录'
                this.openModal(isLogin ? 'register' : 'login')
            })
            this.elements.modalActionBtn.addEventListener('click', () => this.handleAuthAction())
            
            // 标签切换
            this.elements.tabHome.addEventListener('click', () => {
                this.state.currentMode = 'home'
                this.elements.tabHome.classList.add('active')
                this.elements.tabAll.classList.remove('active')
                this.elements.searchBox.style.display = 'none'
                this.elements.sortSection.style.display = 'none'
                this.loadData('home')
            })
            this.elements.tabAll.addEventListener('click', () => {
                this.state.currentMode = 'all'
                this.state.currentPage = 1
                this.elements.tabAll.classList.add('active')
                this.elements.tabHome.classList.remove('active')
                this.elements.searchBox.style.display = 'flex'
                this.elements.sortSection.style.display = 'flex'
                this.loadData('all', this.elements.searchInput.value, 1)
            })
            
            // 排序选择
            this.elements.sortSelect.addEventListener('change', () => {
                this.state.sortBy = this.elements.sortSelect.value
                this.state.currentPage = 1
                this.loadData(this.state.currentMode, this.elements.searchInput.value, 1)
            })
            
            // 搜索
            let searchTimer
            this.elements.searchInput.addEventListener('input', () => {
                clearTimeout(searchTimer)
                searchTimer = setTimeout(() => {
                    if (this.state.currentMode === 'all') {
                        this.state.currentPage = 1
                        this.loadData('all', this.elements.searchInput.value, 1)
                    }
                }, 500)
            })
            
            // 发布表单
            this.elements.addForm.addEventListener('submit', (e) => {
                e.preventDefault()
                this.handleSubmit()
            })
            
            // 登录提示链接
            if (this.elements.showLoginBtn) {
                this.elements.showLoginBtn.addEventListener('click', () => this.openModal('login'))
            }
        },
        
        // 更新认证 UI
        updateAuthUI(user) {
            this.state.currentUser = user
            
            // 游客模式
            if (this.config.guestMode) {
                // 显示游客界面
                this.elements.authSection.innerHTML = `
                    <div class="auth-buttons" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                        <div id="guestNameDisplay" style="font-size: 1.2rem; color: #a1314b; font-weight: 600;">${this.state.guestName || '游客'}</div>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="guestNameInput" placeholder="输入你的昵称" style="padding: 0.8rem 1.2rem; border: 1px solid #ffb6c1; border-radius: 20px; font-size: 1rem;">
                            <button id="setGuestNameBtn" class="auth-btn" style="padding: 0.8rem 1.5rem;">设置昵称</button>
                        </div>
                    </div>
                `
                
                // 重新绑定事件
                if (this.elements.setGuestNameBtn) {
                    this.elements.setGuestNameBtn.addEventListener('click', () => {
                        const name = this.elements.guestNameInput.value
                        this.setGuestName(name)
                    })
                }
                if (this.elements.guestNameInput) {
                    this.elements.guestNameInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const name = this.elements.guestNameInput.value
                            this.setGuestName(name)
                        }
                    })
                }
                
                // 显示发布区域
                this.elements.postSection.style.display = 'block'
                this.elements.loginPromptSection.style.display = 'none'
            } else if (user) {
                // 已登录用户
                this.elements.authSection.innerHTML = `
                    <div class="user-info">
                        <span class="user-email">${this.escapeHtml(user.email)}</span>
                        <button class="logout-btn" id="logoutBtn" title="退出">✖</button>
                    </div>
                `
                document.getElementById('logoutBtn').addEventListener('click', () => this.logout())
                this.elements.postSection.style.display = 'block'
                this.elements.loginPromptSection.style.display = 'none'
            } else {
                // 未登录用户（非游客模式）
                this.elements.authSection.innerHTML = `
                    <div class="auth-buttons">
                        <button class="auth-btn" id="openLoginBtn">登录</button>
                        <button class="auth-btn" id="openRegisterBtn">注册</button>
                    </div>
                `
                document.getElementById('openLoginBtn').addEventListener('click', () => this.openModal('login'))
                document.getElementById('openRegisterBtn').addEventListener('click', () => this.openModal('register'))
                this.elements.postSection.style.display = 'none'
                this.elements.loginPromptSection.style.display = 'block'
            }
        },
        
        // 打开模态框
        openModal(mode) {
            this.elements.errorMsg.textContent = ''
            this.elements.emailInput.value = ''
            this.elements.passwordInput.value = ''
            this.elements.modalTitle.textContent = mode === 'login' ? '登录' : '注册'
            this.elements.modalActionBtn.textContent = mode === 'login' ? '登录' : '注册'
            this.elements.switchText.textContent = mode === 'login' ? '还没有账号？注册' : '已有账号？登录'
            this.elements.authModal.style.display = 'flex'
        },
        
        // 关闭模态框
        closeModal() {
            this.elements.authModal.style.display = 'none'
        },
        
        // 处理认证操作
        async handleAuthAction() {
            const email = this.elements.emailInput.value.trim()
            const password = this.elements.passwordInput.value.trim()
            
            if (!email || !password) {
                this.elements.errorMsg.textContent = '请填写邮箱和密码'
                return
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                this.elements.errorMsg.textContent = '请输入有效的邮箱地址'
                return
            }
            
            const isLogin = this.elements.modalTitle.textContent === '登录'
            this.elements.errorMsg.textContent = ''
            
            try {
                this.elements.modalActionBtn.disabled = true
                this.elements.modalActionBtn.textContent = isLogin ? '登录中...' : '注册中...'
                
                let result
                if (isLogin) {
                    result = await this.supabase.auth.signInWithPassword({ email, password })
                } else {
                    result = await this.supabase.auth.signUp({ email, password })
                }
                
                if (result.error) throw result.error
                
                if (!isLogin && !result.data.session) {
                    alert('注册成功，请查看邮箱确认（若已自动登录则忽略）')
                }
                
                this.closeModal()
            } catch (error) {
                console.error('认证失败:', error)
                this.elements.errorMsg.textContent = error.message
            } finally {
                this.elements.modalActionBtn.disabled = false
                this.elements.modalActionBtn.textContent = isLogin ? '登录' : '注册'
            }
        },
        
        // 退出登录
        async logout() {
            try {
                await this.supabase.auth.signOut()
            } catch (error) {
                console.error('退出登录失败:', error)
                this.showError('退出登录失败')
            }
        },
        
        // 获取当前用户
        async fetchCurrentUser() {
            try {
                const { data: { user } } = await this.supabase.auth.getUser()
                this.updateAuthUI(user)
                
                // 监听认证状态变化
                this.supabase.auth.onAuthStateChange((event, session) => {
                    this.updateAuthUI(session?.user || null)
                    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                        this.loadData(this.state.currentMode, this.elements.searchInput.value)
                    }
                })
            } catch (error) {
                console.error('获取用户信息失败:', error)
                this.updateAuthUI(null)
            }
        },
        
        // 上传图片
        async uploadImage(file) {
            const fileExt = file.name.split('.').pop()
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`
            const filePath = fileName
            
            try {
                const { error } = await this.supabase.storage
                    .from(this.config.storageBucket)
                    .upload(filePath, file)
                
                if (error) throw error
                
                const { data: urlData } = this.supabase.storage
                    .from(this.config.storageBucket)
                    .getPublicUrl(filePath)
                
                return urlData.publicUrl
            } catch (error) {
                console.error('图片上传失败:', error)
                throw error
            }
        },
        
        // 渲染卡片
        renderCards(letters) {
            if (!letters || letters.length === 0) {
                this.elements.cardContainer.innerHTML = '<div class="no-data">✨ 还没有情书，快来写下第一封吧 ✨</div>'
                return
            }
            
            let html = ''
            letters.forEach(item => {
                const id = item.id
                const line1 = this.escapeHtml(item.line1 || '')
                const line2 = this.escapeHtml(item.line2 || '')
                const line3 = this.escapeHtml(item.line3 || '')
                const story = this.escapeHtml(item.story || '')
                const imageUrl = item.image_url || ''
                const votes = item.votes || 0
                const hasVoted = this.state.votedIds.has(id)
                const currentUserId = this.config.guestMode ? this.state.guestId : (this.state.currentUser ? this.state.currentUser.id : null)
                const isOwner = currentUserId && item.user_id === currentUserId

                let storyHtml = ''
                if (story) storyHtml += `<div class="story-text"><strong>📖 故事 ·</strong> ${story}</div>`
                if (imageUrl) storyHtml += `<img src="${imageUrl}" alt="配图" class="story-image" loading="lazy">`

                html += `
                    <div class="card" data-id="${id}">
                        ${isOwner ? '<button class="delete-btn" title="删除情书">✖</button>' : ''}
                        <div class="lines">
                            <div class="line">${line1}</div>
                            <div class="line">${line2}</div>
                            <div class="line">${line3}</div>
                        </div>
                        ${storyHtml ? `<button class="story-toggle-btn" data-story-id="${id}">📖 查看故事</button>` : ''}
                        <div class="story-content" data-story-content="${id}" style="display: none;">
                            ${storyHtml}
                        </div>
                        <div class="vote-section">
                            <button class="vote-btn" data-id="${id}" ${hasVoted ? 'disabled' : ''}>
                                ${hasVoted ? '✅ 已提名' : '👍 提名'}
                            </button>
                            <span class="vote-count">🏅 ${votes}</span>
                        </div>
                    </div>
                `
            })
            
            this.elements.cardContainer.innerHTML = html
            this.bindCardEvents()
        },
        
        // 追加卡片
        appendCards(letters) {
            if (!letters || letters.length === 0) return
            
            let html = ''
            letters.forEach(item => {
                const id = item.id
                const line1 = this.escapeHtml(item.line1 || '')
                const line2 = this.escapeHtml(item.line2 || '')
                const line3 = this.escapeHtml(item.line3 || '')
                const story = this.escapeHtml(item.story || '')
                const imageUrl = item.image_url || ''
                const votes = item.votes || 0
                const hasVoted = this.state.votedIds.has(id)
                const currentUserId = this.config.guestMode ? this.state.guestId : (this.state.currentUser ? this.state.currentUser.id : null)
                const isOwner = currentUserId && item.user_id === currentUserId

                let storyHtml = ''
                if (story) storyHtml += `<div class="story-text"><strong>📖 故事 ·</strong> ${story}</div>`
                if (imageUrl) storyHtml += `<img src="${imageUrl}" alt="配图" class="story-image" loading="lazy">`

                html += `
                    <div class="card" data-id="${id}">
                        ${isOwner ? '<button class="delete-btn" title="删除情书">✖</button>' : ''}
                        <div class="lines">
                            <div class="line">${line1}</div>
                            <div class="line">${line2}</div>
                            <div class="line">${line3}</div>
                        </div>
                        ${storyHtml ? `<button class="story-toggle-btn" data-story-id="${id}">📖 查看故事</button>` : ''}
                        <div class="story-content" data-story-content="${id}" style="display: none;">
                            ${storyHtml}
                        </div>
                        <div class="vote-section">
                            <button class="vote-btn" data-id="${id}" ${hasVoted ? 'disabled' : ''}>
                                ${hasVoted ? '✅ 已提名' : '👍 提名'}
                            </button>
                            <span class="vote-count">🏅 ${votes}</span>
                        </div>
                    </div>
                `
            })
            
            // 移除加载更多按钮（如果存在）
            document.getElementById('loadMoreBtn')?.remove()
            
            // 追加新卡片
            this.elements.cardContainer.insertAdjacentHTML('beforeend', html)
            
            // 重新绑定事件
            this.bindCardEvents()
        },
        
        // 绑定卡片事件
        bindCardEvents() {
            // 故事展开/折叠
            document.querySelectorAll('.story-toggle-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation()
                    const card = btn.closest('.card')
                    const storyDiv = card.querySelector('.story-content')
                    if (storyDiv.style.display === 'none') {
                        storyDiv.style.display = 'block'
                        btn.textContent = '📖 收起故事'
                    } else {
                        storyDiv.style.display = 'none'
                        btn.textContent = '📖 查看故事'
                    }
                })
            })

            // 提名事件
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation()
                    const id = btn.dataset.id
                    if (!id || this.state.votedIds.has(id)) return
                    
                    try {
                        const originalText = btn.textContent
                        btn.disabled = true
                        btn.textContent = '提名中...'
                        
                        const { error } = await this.supabase.rpc('increment_votes', { row_id: id })
                        if (error) throw error
                        
                        this.state.votedIds.add(id)
                        this.saveVotedIds()
                        
                        // 局部更新，避免重新加载整个列表
                        const card = btn.closest('.card')
                        const voteCountElement = card.querySelector('.vote-count')
                        const currentVotes = parseInt(voteCountElement.textContent.match(/\d+/)[0])
                        voteCountElement.textContent = `🏅 ${currentVotes + 1}`
                        btn.textContent = '✅ 已提名'
                    } catch (error) {
                        console.error('提名失败:', error)
                        alert('提名失败：' + error.message)
                        btn.disabled = false
                        btn.textContent = '👍 提名'
                    }
                })
            })

            // 删除事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation()
                    const card = btn.closest('.card')
                    const id = card?.dataset.id
                    if (!id) return
                    if (!confirm('确定删除这封情书吗？')) return
                    
                    try {
                        const { error } = await this.supabase
                            .from(this.config.tableName)
                            .delete()
                            .eq('id', id)
                        
                        if (error) throw error
                        
                        if (this.state.votedIds.has(id)) {
                            this.state.votedIds.delete(id)
                            this.saveVotedIds()
                        }
                        
                        card.remove()
                        
                        // 检查是否需要显示空状态
                        if (document.querySelectorAll('.card').length === 0) {
                            this.elements.cardContainer.innerHTML = '<div class="no-data">✨ 还没有情书，快来写下第一封吧 ✨</div>'
                        }
                    } catch (error) {
                        console.error('删除失败:', error)
                        alert('删除失败：' + error.message)
                    }
                })
            })
        },
        
        // 添加加载更多按钮
        addLoadMoreButton() {
            // 移除已存在的加载更多按钮
            document.getElementById('loadMoreBtn')?.remove()
            
            // 添加新的加载更多按钮
            this.elements.cardContainer.insertAdjacentHTML('beforeend', `
                <div style="grid-column: 1 / -1; text-align: center; margin-top: 1rem;">
                    <button id="loadMoreBtn" class="auth-btn" style="width: 200px;">
                        加载更多
                    </button>
                </div>
            `)
            
            // 添加点击事件
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                this.state.currentPage++
                this.loadData(this.state.currentMode, this.elements.searchInput.value, this.state.currentPage, true)
            })
        },
        
        // 加载数据
        async loadData(mode, searchText = '', page = 1, append = false) {
            if (this.state.isLoading) return
            this.state.isLoading = true
            
            // 显示加载状态
            if (!append) {
                this.elements.cardContainer.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <span>加载中...</span>
                    </div>
                `
            } else {
                // 添加加载更多指示器
                this.elements.cardContainer.insertAdjacentHTML('beforeend', `
                    <div class="loading" id="loadMoreIndicator">
                        <div class="loading-spinner"></div>
                        <span>加载更多...</span>
                    </div>
                `)
            }
            
            let query = this.supabase.from(this.config.tableName).select('*')
            if (mode === 'home') {
                query = query.order('votes', { ascending: false }).limit(3)
            } else {
                // 根据排序方式排序
                if (this.state.sortBy === 'most_voted') {
                    query = query.order('votes', { ascending: false })
                } else {
                    query = query.order('created_at', { ascending: false })
                }
                if (searchText.trim()) {
                    query = query.or(`line1.ilike.%${searchText}%,line2.ilike.%${searchText}%,line3.ilike.%${searchText}%,story.ilike.%${searchText}%`)
                }
                // 添加分页
                query = query.range((page - 1) * this.config.pageSize, page * this.config.pageSize - 1)
            }
            
            try {
                const { data, error } = await query
                if (error) throw error
                
                if (append) {
                    // 移除加载指示器
                    document.getElementById('loadMoreIndicator')?.remove()
                    // 追加卡片
                    this.appendCards(data || [])
                } else {
                    this.renderCards(data || [])
                }
                
                // 添加加载更多按钮（如果有更多数据）
                if (mode !== 'home' && (data?.length || 0) === this.config.pageSize) {
                    this.addLoadMoreButton()
                }
            } catch (error) {
                console.error('加载数据失败:', error)
                if (!append) {
                    this.elements.cardContainer.innerHTML = '<div class="status">加载失败，请检查网络或配置</div>'
                } else {
                    document.getElementById('loadMoreIndicator')?.remove()
                    this.elements.cardContainer.insertAdjacentHTML('beforeend', '<div class="status">加载更多失败</div>')
                }
            } finally {
                this.state.isLoading = false
            }
        },
        
        // 处理表单提交
        async handleSubmit() {
            // 检查是否有游客 ID 或用户 ID
            if (!this.config.guestMode && !this.state.currentUser) {
                alert('请先登录')
                return
            }
            
            const line1 = this.elements.line1Input.value.trim()
            const line2 = this.elements.line2Input.value.trim()
            const line3 = this.elements.line3Input.value.trim()
            const story = this.elements.storyInput.value.trim()
            const file = this.elements.imageUpload.files[0]

            // 增强客户端验证
            if (!line1 || !line2 || !line3) {
                alert('三行情书不能为空')
                return
            }
            if (line1.length > 20 || line2.length > 20 || line3.length > 20) {
                alert('每行不能超过20字')
                return
            }
            if (story.length > 200) {
                alert('故事不能超过200字')
                return
            }
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    alert('图片不能超过2MB')
                    return
                }
                if (!file.type.startsWith('image/')) {
                    alert('请上传图片文件')
                    return
                }
            }
            
            // 检查是否包含敏感词（简单实现）
            const sensitiveWords = ['敏感词1', '敏感词2']
            const content = `${line1} ${line2} ${line3} ${story}`
            for (const word of sensitiveWords) {
                if (content.includes(word)) {
                    alert('内容包含敏感词，请修改后重试')
                    return
                }
            }

            this.elements.submitBtn.disabled = true
            this.elements.submitBtn.textContent = '发布中...'
            
            try {
                let imageUrl = ''
                if (file) {
                    imageUrl = await this.uploadImage(file)
                }

                // 获取用户 ID（游客模式使用游客 ID）
                const userId = this.config.guestMode ? this.state.guestId : this.state.currentUser.id

                const { error } = await this.supabase.from(this.config.tableName).insert([{
    line1, line2, line3, story,
    image_url: imageUrl,
    votes: 0,
    user_id: userId,
    created_at: new Date().toISOString()
}])
                
                if (error) throw error

                alert('发布成功')
                this.elements.line1Input.value = this.elements.line2Input.value = this.elements.line3Input.value = this.elements.storyInput.value = ''
                this.elements.imageUpload.value = ''
                this.elements.fileName.textContent = '未选择文件'
                this.updateCounters()
                this.loadData(this.state.currentMode, this.elements.searchInput.value)
            } catch (error) {
                console.error('发布失败:', error)
                alert('发布失败：' + error.message)
            } finally {
                this.elements.submitBtn.disabled = false
                this.elements.submitBtn.textContent = '💌 发布情书'
            }
        },
        
        // 更新字数统计
        updateCounters() {
            this.elements.line1Counter.textContent = `${this.elements.line1Input.value.length}/20`
            this.elements.line2Counter.textContent = `${this.elements.line2Input.value.length}/20`
            this.elements.line3Counter.textContent = `${this.elements.line3Input.value.length}/20`
            this.elements.storyCounter.textContent = `${this.elements.storyInput.value.length}/200`
        },
        
        // 转义 HTML
        escapeHtml(unsafe) {
            if (!unsafe) return ''
            return unsafe.replace(/[&<>"']/g, m => {
                if (m === '&') return '&amp;'
                if (m === '<') return '&lt;'
                if (m === '>') return '&gt;'
                if (m === '"') return '&quot;'
                if (m === "'") return '&#39;'
                return m
            })
        },
        
        // 显示错误信息
        showError(message) {
            alert(`错误: ${message}`)
        },
        
        // 上传图片
        async uploadImage(file) {
            try {
                const fileName = `${Date.now()}-${file.name}`
                const { data, error } = await this.supabase.storage
                    .from(this.config.storageBucket)
                    .upload(fileName, file)
                
                if (error) throw error
                
                // 获取公共 URL
                const { data: urlData } = await this.supabase.storage
                    .from(this.config.storageBucket)
                    .getPublicUrl(fileName)
                
                return urlData.publicUrl
            } catch (error) {
                this.logError(error, '上传图片')
                throw new Error('图片上传失败')
            }
        },
        
        // 检查 Supabase 配置
        checkSupabaseConfig() {
            if (this.config.supabaseUrl === 'YOUR_SUPABASE_URL' || this.config.supabaseAnonKey === 'YOUR_SUPABASE_ANON_KEY') {
                this.showError('请先配置 Supabase 项目信息')
                return false
            }
            return true
        }
    }
    
    // 初始化应用
    document.addEventListener('DOMContentLoaded', () => {
        App.init()
    })
</script>
</body>
</html>
